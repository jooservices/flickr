title = "JOOservices Flickr Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted files and patterns"

paths = [
  '''\.txt$''',
  '''^tests/Fixtures/''',
  '''^\.gitleaks\.toml$''',
  '''composer\.lock$''',
  '''^vendor/''',
]

regexes = [
  '''example[_-]?key''',
  '''fake[_-]?secret''',
  '''dummy[_-]?token''',
  '''test[_-]?password''',
  '''YOUR[_-]?API[_-]?KEY''',
  '''REPLACE[_-]?ME''',
  '''CHANGEME''',
  '''xxxxxxxx''',
]

stopwords = [
  '''example''',
  '''sample''',
  '''placeholder''',
]
