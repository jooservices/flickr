name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PHP_VERSION: '8.5'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json
          coverage: pcov

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run security audit
        run: composer audit --locked --abandoned=ignore

      - name: Run lint checks
        run: composer lint:all

      - name: Run verification scripts
        run: |
          composer verify:registry
          composer verify:api-index

      - name: Run tests
        run: composer test

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
      discussions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  publish:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - name: Trigger Packagist Update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -XPOST -H'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}" \
            -d'{"repository":{"url":"https://packagist.org/packages/jooservices/flickr"},"api_token":"'"${PACKAGIST_TOKEN}"'"}'
