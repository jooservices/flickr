name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.5'
  FLICKR_REAL_TESTS: 'false'

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run Composer Audit
        run: composer audit --locked --abandoned=ignore

  lint:
    name: Lint - ${{ matrix.tool.name }}
    runs-on: ubuntu-latest
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: Pint
            command: lint:pint
          - name: PHPCS
            command: lint:phpcs
          - name: PHPStan
            command: lint:phpstan
          - name: PHPMD
            command: lint:phpmd
          - name: PHP-CS-Fixer
            command: lint:cs
          - name: Registry
            command: verify:registry
          - name: API Index
            command: verify:api-index
          - name: Consumer Smoke
            command: verify:smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Run ${{ matrix.tool.name }}
        run: composer ${{ matrix.tool.command }}

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json
          coverage: pcov

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Run tests with coverage
        run: composer test:coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$statements = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            \$percent = \$statements > 0 ? round((\$covered / \$statements) * 100, 2) : 0;
            echo \$percent;
          ")
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "::error::Code coverage ${COVERAGE}% is below minimum threshold of 95%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-flickr
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/
            coverage.xml
          retention-days: 30
