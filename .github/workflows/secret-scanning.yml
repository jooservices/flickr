name: Secret Scanning

on:
  push:
    branches: [master, develop]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scanning-disabled:
    name: Secret Scanning Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Report disabled workflow
        run: echo "Gitleaks secret scanning is disabled until GITLEAKS_LICENSE is configured."
